<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>송금 확인</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            padding: 50px;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        h1 {
            color: #3e7dff;
        }
        .amount {
            font-size: 24px;
            color: #ff3b30;
        }
        .btn {
            background-color: #3e7dff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn:hover {
            background-color: #2f66d2;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>송금이 확인되었습니다!</h1>
    <p>보낸 금액: <span class="amount">₩1,000,000</span></p>
    <p>송금 내역을 확인하려면 아래 버튼을 눌러주세요.</p>
    <button class="btn" onclick="confirmTransaction()">송금 내역 확인</button>
</div>

<script>
    function confirmTransaction() {
        alert("송금 내역을 확인하는 페이지는 실제로 존재하지 않아요. 장난이었습니다!");
    }
</script>

</body>
</html>
